<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección de Videojuegos</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <h1>🎮 Mi Colección de Videojuegos</h1>

    <div class="controls">

        <input type="text" id="search" placeholder="Buscar juego...">

        <select id="platformFilter">
            <option value="">Todas las plataformas</option>
        </select>

        <select id="sortFilter">
            <option value="az">Nombre A-Z</option>
            <option value="za">Nombre Z-A</option>
            <option value="available">Solo disponibles</option>
            <option value="loaned">Solo prestados</option>
        </select>

        <select id="favFilter">
            <option value="">Todos</option>
            <option value="fav">⭐ Solo favoritos</option>
        </select>

    </div>

    <div id="stats"></div>

</header>

<main>

    <div id="gamesContainer" class="games-grid"></div>

</main>

<!-- MODAL DETALLE -->
<div id="modal" class="modal hidden">
    <div class="modal-content">

        <span class="close" onclick="cerrarModal()">✖</span>

        <div id="modalBody"></div>

    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
